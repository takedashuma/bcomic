version: "3.9"

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: zcomic-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COMIC_ROOT: ${COMIC_ROOT_CONTAINER:-/comics}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
      PORT: 4000
      NODE_ENV: production
    volumes:
      # コミック画像をマウント。
      # ・対処A使用時: ホストの /Volumes/public/... を bind マウント（COMIC_ROOT_HOST に絶対パス）
      # ・対処B使用時: 下の named volume "comic_data" を使う（SMB直接マウント）
      - ${COMIC_ROOT_HOST}:${COMIC_ROOT_CONTAINER:-/comics}:ro
      # 対処B時はこちらを有効化（上の bind 行をコメントアウト）:
      # - comic_data:${COMIC_ROOT_CONTAINER:-/comics}:ro
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - zcomic

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # 空文字を許容（相対URLでnginx同一オリジン経由 = LAN/外部両対応）
        # 強制指定したい場合だけ .env で VITE_API_URL=http://xxx を設定する
        VITE_API_URL: "${VITE_API_URL-}"
    container_name: zcomic-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - zcomic

  # ===== 管理サイト =====
  # 本サイト(api/web)とは完全に独立。 DB / FS は共有するが、コードベース・コンテナ・ポート全て別。
  api-admin:
    build:
      context: ./apps/api-admin
      dockerfile: Dockerfile
    container_name: zcomic-api-admin
    restart: unless-stopped
    environment:
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:-${DATABASE_URL}}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_EXPIRES_IN: ${ADMIN_JWT_EXPIRES_IN:-1d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COMIC_ROOT: ${COMIC_ROOT_CONTAINER:-/comics}
      STAGING_ROOT: ${STAGING_ROOT_CONTAINER:-/staging}
      # Home 3ボタンが使う固定ディレクトリ（コンテナ内パス）
      EXTRACT_ARCHIVE_DIR: ${EXTRACT_ARCHIVE_DIR:-/download_root/Zip}
      EXTRACT_ER_ARCHIVE_DIR: ${EXTRACT_ER_ARCHIVE_DIR:-/download_root/Zip}
      UNZIP_DEST_DIR: ${UNZIP_DEST_DIR:-/download_root/Unzip}
      ARCHIVE_DONE_DIR: ${ARCHIVE_DONE_DIR:-/download_root/zFin}
      UNZIP_DEST_DIR_ER: ${UNZIP_DEST_DIR_ER:-}
      ARCHIVE_DONE_DIR_ER: ${ARCHIVE_DONE_DIR_ER:-}
      MERGE_CHAPTER_DIR: ${MERGE_CHAPTER_DIR:-/download_root/Chapter}
      REGIST_DIR: ${REGIST_DIR:-/download_root/Regist}
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:-http://localhost:5174,http://localhost:8081}
      ADMIN_PORT: 4001
      NODE_ENV: production
    volumes:
      # COMIC_ROOT は管理側でも参照(登録時のパス検証等)、 ただし read-only
      - ${COMIC_ROOT_HOST}:${COMIC_ROOT_CONTAINER:-/comics}:ro
      # 作業領域（移動・削除・作成）は read-write
      - ${STAGING_ROOT_HOST:-${COMIC_ROOT_HOST}}:${STAGING_ROOT_CONTAINER:-/staging}
      # /Volumes/public/Download をまとめて1マウント（rename が cross-device にならないため）
      # 配下: /Zip /Unzip /zFin /Chapter
      - ${DOWNLOAD_ROOT_HOST:-/Volumes/public/Download}:${DOWNLOAD_ROOT_CONTAINER:-/download_root}
    ports:
      - "${ADMIN_API_PORT:-4001}:4001"
    networks:
      - zcomic

  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_API_URL: "${VITE_ADMIN_API_URL-}"
    container_name: zcomic-web-admin
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-8081}:80"
    depends_on:
      - api-admin
    networks:
      - zcomic

networks:
  zcomic:
    driver: bridge

# ===== 対処B（NAS SMBを直接マウント）用 =====
# 上の api.volumes の bind 行を comic_data に切り替えて使用。
# .env に SMB_HOST / SMB_SHARE / SMB_USER / SMB_PASSWORD を設定。
volumes:
  comic_data:
    driver: local
    driver_opts:
      type: cifs
      o: "username=${SMB_USER:-},password=${SMB_PASSWORD:-},ro,uid=1000,gid=1000,vers=3.0,nounix,noserverino"
      device: "//${SMB_HOST:-127.0.0.1}/${SMB_SHARE:-public}/Comic/Renamed"
